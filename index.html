<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Labyrinth Player</title>
    <style>
        body {
            background-color: #0a0a0c;
            color: #00ffcc;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .player-container {
            background: #1a1a1f;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.2);
            border: 1px solid #00ffcc;
            text-align: center;
            max-width: 400px;
        }

        h2 {
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        audio {
            width: 100%;
            margin-top: 10px;
            filter: invert(100%) hue-rotate(180deg) brightness(1.5); /* Style pour matcher le thème */
        }

        .lyrics {
            margin-top: 1.5rem;
            font-size: 0.9rem;
            color: #888;
            font-style: italic;
        }
    </style>
</head>
<body>

<div class="player-container">
    <h2>Digital Labyrinth</h2>
    <p>Searching for my place...</p>
    
    <audio controls>
        <source src="digital_labyrinth.mp3" type="audio/mpeg">
        Votre navigateur ne supporte pas l'élément audio.
    </audio>

    <div class="lyrics">
        "Just an error in their cold equation..."
    </div>
</div>

</body>
</html>
