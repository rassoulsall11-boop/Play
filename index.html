<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Open World Prototype</title>
<style>
  body { margin: 0; overflow: hidden; font-family: sans-serif; }
  #info { position: absolute; top: 10px; left: 10px; color: white; background: rgba(0,0,0,0.5); padding: 10px; }
</style>
</head>
<body>
<div id="info">Clique pour prendre le contrôle. WASD pour bouger, souris pour regarder.</div>

<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.js';
import { PointerLockControls } from 'https://cdn.jsdelivr.net/npm/three@0.162.0/examples/jsm/controls/PointerLockControls.js';

let camera, scene, renderer, controls;
let objects = [];
let move = { forward: false, backward: false, left: false, right: false };

init();
animate();

function init() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87ceeb);

    const light = new THREE.DirectionalLight(0xffffff, 1);
    light.position.set(10, 20, 10);
    scene.add(light);
    scene.add(new THREE.AmbientLight(0x404040));

    camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 2, 5);

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    controls = new PointerLockControls(camera, renderer.domElement);
    document.body.addEventListener('click', () => controls.lock());

    // Terrain
    const geometry = new THREE.PlaneGeometry(200, 200, 32, 32);
    geometry.rotateX(-Math.PI/2);
    for (let i = 0; i < geometry.attributes.position.count; i++) {
        geometry.attributes.position.setY(i, Math.random() * 2);
    }
    const material = new THREE.MeshStandardMaterial({ color: 0x228B22 });
    const terrain = new THREE.Mesh(geometry, material);
    scene.add(terrain);

    // Objets
    for (let i = 0; i < 50; i++) {
        const rockGeo = new THREE.DodecahedronGeometry(Math.random() * 1 + 0.5, 0);
        const rockMat = new THREE.MeshStandardMaterial({ color: 0x808080 });
        const rock = new THREE.Mesh(rockGeo, rockMat);
        rock.position.set(Math.random()*100-50, 1, Math.random()*100-50);
        scene.add(rock);
        objects.push(rock);
    }

    document.addEventListener('keydown', onKeyDown);
    document.addEventListener('keyup', onKeyUp);
    window.addEventListener('resize', onWindowResize);
}

function onKeyDown(event) {
    switch(event.code) {
        case 'KeyW': move.forward = true; break;
        case 'KeyS': move.backward = true; break;
        case 'KeyA': move.left = true; break;
        case 'KeyD': move.right = true; break;
    }
}

function onKeyUp(event) {
    switch(event.code) {
        case 'KeyW': move.forward = false; break;
        case 'KeyS': move.backward = false; break;
        case 'KeyA': move.left = false; break;
        case 'KeyD': move.right = false; break;
    }
}

function onWindowResize() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
}

const velocity = new THREE.Vector3();
function animate() {
    requestAnimationFrame(animate);

    const speed = 0.1;
    velocity.x = velocity.z = 0;
    if (move.forward) velocity.z = -speed;
    if (move.backward) velocity.z = speed;
    if (move.left) velocity.x = -speed;
    if (move.right) velocity.x = speed;

    controls.moveRight(velocity.x);
    controls.moveForward(velocity.z);

    renderer.render(scene, camera);
}
</script>
</body>
</html>
