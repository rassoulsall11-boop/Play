<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ma Liste de Tâches</title>
    <style>
        :root {
            --primary: #6366f1;
            --bg: #f8fafc;
            --text: #1e293b;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }

        .container {
            background: white;
            width: 100%;
            max-width: 450px;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
        }

        h2 { margin-top: 0; color: var(--primary); }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input[type="text"] {
            flex-grow: 1;
            padding: 10px;
            border: 2px solid #e2e8f0;
            border-radius: 6px;
            outline: none;
        }

        input[type="text"]:focus { border-color: var(--primary); }

        button#add-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        ul { list-style: none; padding: 0; }

        li {
            background: #fff;
            border-bottom: 1px solid #f1f5f9;
            padding: 12px 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: transform 0.2s;
        }

        li:hover { background: #fdfdfd; }

        .task-text { flex-grow: 1; cursor: pointer; }

        .completed {
            text-decoration: line-through;
            color: #94a3b8;
        }

        .delete-btn {
            background: #fee2e2;
            color: #ef4444;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Mes Objectifs</h2>
    
    <div class="input-group">
        <input type="text" id="taskInput" placeholder="Ajouter une tâche...">
        <button id="add-btn">Ajouter</button>
    </div>

    <ul id="taskList">
        </ul>
</div>

<script>
    const input = document.getElementById('taskInput');
    const addBtn = document.getElementById('add-btn');
    const taskList = document.getElementById('taskList');

    function addTask() {
        const text = input.value.trim();
        if (text === "") return;

        const li = document.createElement('li');
        li.innerHTML = `
            <span class="task-text">${text}</span>
            <button class="delete-btn">Supprimer</button>
        `;

        // Clic sur le texte pour barrer
        li.querySelector('.task-text').addEventListener('click', function() {
            this.classList.toggle('completed');
        });

        // Clic sur supprimer
        li.querySelector('.delete-btn').addEventListener('click', function() {
            li.remove();
        });

        taskList.appendChild(li);
        input.value = "";
    }

    addBtn.addEventListener('click', addTask);

    // Ajouter avec la touche "Entrée"
    input.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') addTask();
    });
</script>

</body>
</html>
