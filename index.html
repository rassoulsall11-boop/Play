<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IA Locale 100% Privée</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; padding: 20px; text-align: center; }
        #chat-box { width: 80%; margin: auto; height: 300px; border: 1px solid #444; overflow-y: auto; padding: 15px; text-align: left; background: #1e1e1e; border-radius: 10px; }
        #status { color: #8ab4f8; margin-bottom: 10px; font-size: 0.9em; }
        input { width: 70%; padding: 10px; border-radius: 5px; border: none; margin-top: 10px; }
        button { padding: 10px 20px; cursor: pointer; background: #8ab4f8; border: none; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>

    <h2>IA Navigateur (Sans API)</h2>
    <div id="status">Chargement du moteur...</div>
    <div id="chat-box" id="display">Bienvenue. L'IA va se charger dans ton navigateur...</div>
    
    <input type="text" id="userInput" placeholder="Pose ta question...">
    <button onclick="askIA()">Envoyer</button>

    <script type="module">
        import * as webllm from "https://esm.run/@mlc-ai/web-llm";

        const status = document.getElementById("status");
        const chatBox = document.getElementById("chat-box");
        let engine;

        // Configuration du modèle (Llama-3 en version légère)
        async function init() {
            engine = await webllm.CreateMLCEngine("Llama-3-8B-Instruct-q4f32_1-MLC", {
                initProgressCallback: (p) => { status.innerText = p.text; }
            });
            status.innerText = "IA Prête ! (Tourne sur ton GPU)";
        }

        window.askIA = async function() {
            const input = document.getElementById("userInput").value;
            chatBox.innerHTML += `<p><b>Toi:</b> ${input}</p>`;
            
            const reply = await engine.chat.completions.create({
                messages: [{ role: "user", content: input }]
            });
            
            chatBox.innerHTML += `<p><b>IA:</b> ${reply.choices[0].message.content}</p>`;
            document.getElementById("userInput").value = "";
        }

        init();
    </script>
</body>
</html>
