        import * as THREE from 'three';

        /**
         * NEXUS ARCHITECT V4.0

        // --- GLOBAL CONSTANTS & CONFIG ---
        const CONFIG = {
            GRAVITY: -35,
            PLAYER_SPEED: 12,
            PLAYER_DASH_MULTIPLIER: 2.2,
            JUMP_FORCE: 15,
            CHUNK_SIZE: 500,
            WORLD_SEED: Math.random()
        };

        // --- UTILITIES ---
        const generateToonGradient = () => {
            const canvas = document.createElement('canvas');
            canvas.width = 4; canvas.height = 1;
            const context = canvas.getContext('2d');
            context.fillStyle = '#222222'; context.fillRect(0, 0, 1, 1); // Shadow
            context.fillStyle = '#666666'; context.fillRect(1, 0, 1, 1); // Midtone
            context.fillStyle = '#cccccc'; context.fillRect(2, 0, 1, 1); // Base
            context.fillStyle = '#ffffff'; context.fillRect(3, 0, 1, 1); // Highlight
            const texture = new THREE.CanvasTexture(canvas);
            texture.minFilter = THREE.NearestFilter;
            texture.magFilter = THREE.NearestFilter;
            return texture;
        };

        const toonTexture = generateToonGradient();

        // --- PROCEDURAL ENVIRONMENT ENGINE ---
        class TerrainManager {
            constructor(scene) {
                this.scene = scene;
                this.noise = new SimplexNoise();
                this.geometry = new THREE.PlaneGeometry(CONFIG.CHUNK_SIZE, CONFIG.CHUNK_SIZE, 128, 128);
                this.geometry.rotateX(-Math.PI / 2);
                
                this.material = new THREE.MeshToonMaterial({ 
                    color: 0x6bb845, 
                    gradientMap: toonTexture,
                    side: THREE.FrontSide
                });

                this.applyNoise();
                this.mesh = new THREE.Mesh(this.geometry, this.material);
                this.mesh.receiveShadow = true;
                this.scene.add(this.mesh);

                this.populateInstancedFoliage();
            }

            applyNoise() {
                const positions = this.geometry.attributes.position;
                for (let i = 0; i < positions.count; i++) {
                    const x = positions.getX(i);
                    const z = positions.getZ(i);
                    // Fractal brownian motion (fBm) for realistic hills
                    let y = this.noise.noise(x * 0.005, z * 0.005) * 15;
                    y += this.noise.noise(x * 0.02, z * 0.02) * 5;
                    positions.setY(i, Math.max(-5, y));
                }
                this.geometry.computeVertexNormals();
            }

            getHeightAt(x, z) {
                // Approximated height check for physics
                let y = this.noise.noise(x * 0.005, z * 0.005) * 15;
                y += this.noise.noise(x * 0.02, z * 0.02) * 5;
                return Math.max(-5, y);
            }

            populateInstancedFoliage() {
                // Ultra-optimized tree rendering using InstancedMesh
                const treeCount = 1000;
                const trunkGeo = new THREE.CylinderGeometry(0.5, 0.8, 4, 6);
                const leavesGeo = new THREE.DodecahedronGeometry(3, 1);
                
                const trunkMat = new THREE.MeshToonMaterial({ color: 0x5c4033, gradientMap: toonTexture });
                const leavesMat = new THREE.MeshToonMaterial({ color: 0x2e8b57, gradientMap: toonTexture });

                this.treeTrunks = new THREE.InstancedMesh(trunkGeo, trunkMat, treeCount);
                this.treeLeaves = new THREE.InstancedMesh(leavesGeo, leavesMat, treeCount);
                
                this.treeTrunks.castShadow = true;
                this.treeLeaves.castShadow = true;

                const dummy = new THREE.Object3D();
                let index = 0;

                for (let i = 0; i < treeCount; i++) {
                    const x = (Math.random() - 0.5) * (CONFIG.CHUNK_SIZE - 20);
                    const z = (Math.random() - 0.5) * (CONFIG.CHUNK_SIZE - 20);
                    const y = this.getHeightAt(x, z);

                    if (y > -2 && Math.random() > 0.3) { // Trees don't grow in deep valleys
                        dummy.position.set(x, y + 2, z);
                        const scale = 0.8 + Math.random() * 0.5;
                        dummy.scale.set(scale, scale, scale);
                        dummy.rotation.y = Math.random() * Math.PI;
                        dummy.updateMatrix();

                        this.treeTrunks.setMatrixAt(index, dummy.matrix);
                        
                        dummy.position.set(x, y + 5 * scale, z);
                        dummy.updateMatrix();
                        this.treeLeaves.setMatrixAt(index, dummy.matrix);
                        
                        index++;
                    }
                }

                this.treeTrunks.count = index;
                this.treeLeaves.count = index;
                this.scene.add(this.treeTrunks);
                this.scene.add(this.treeLeaves);
            }
        }

        // --- VFX / PARTICLE SYSTEM ---
        class VFXManager {
            constructor(scene) {
                this.scene = scene;
                this.particles = [];
            }

            createAnemoBurst(origin) {
                // Object pooling logic conceptualized here
                const particleGeo = new THREE.PlaneGeometry(1, 1);
                const particleMat = new THREE.MeshBasicMaterial({ 
                    color: 0x55E4B0, 
                    transparent: true, 
                    opacity: 0.8,
                    side: THREE.DoubleSide,
                    blending: THREE.AdditiveBlending
                });

                for(let i=0; i<50; i++) {
                    const mesh = new THREE.Mesh(particleGeo, particleMat);
                    mesh.position.copy(origin);
                    mesh.position.y += Math.random() * 2;
                    
                    // Velocity and lifecycle
                    const angle = Math.random() * Math.PI * 2;
                    const radius = Math.random() * 2 + 1;
                    mesh.userData = {
                        vel: new THREE.Vector3(Math.cos(angle)*radius, (Math.random()-0.5)*2, Math.sin(angle)*radius),
                        life: 1.0,
                        rotSpeed: (Math.random() - 0.5) * 0.5
                    };
                    
                    this.scene.add(mesh);
                    this.particles.push(mesh);
                }
            }

            update(dt) {
                for (let i = this.particles.length - 1; i >= 0; i--) {
                    const p = this.particles[i];
                    p.userData.life -= dt * 1.5;
                    
                    if (p.userData.life <= 0) {
                        this.scene.remove(p);
                        p.geometry.dispose();
                        p.material.dispose();
                        this.particles.splice(i, 1);
                        continue;
                    }

                    // Swirl logic (Anemo effect)
                    p.position.addScaledVector(p.userData.vel, dt * 5);
                    p.position.y += dt * 2;
                    p.rotation.z += p.userData.rotSpeed;
                    p.material.opacity = p.userData.life;
                    
                    // Billboard to camera
                    p.lookAt(gameEngine.camera.position);
                }
            }
        }
