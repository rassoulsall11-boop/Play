<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex-Echo Ultra | Open World Engine</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Orbitron', sans-serif; }
        #crosshair {
            position: absolute; top: 50%; left: 50%; width: 14px; height: 14px;
            border: 2px solid rgba(0, 255, 204, 0.7); border-radius: 50%;
            transform: translate(-50%, -50%); pointer-events: none;
        }
        #ui {
            position: absolute; bottom: 30px; left: 30px; color: white;
            text-shadow: 2px 2px 5px rgba(0,0,0,1); pointer-events: none;
        }
        .stats-container { display: flex; flex-direction: column; gap: 8px; }
        .bar-bg { width: 250px; height: 10px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3); }
        #stamina { width: 100%; height: 100%; background: #00ffcc; transition: width 0.1s; }
        #health { width: 100%; height: 100%; background: #ff3366; }
        .controls-hint { margin-top: 15px; font-size: 0.7rem; color: #aaa; text-transform: uppercase; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <div id="crosshair"></div>
    <div id="ui">
        <div style="font-size: 1.5rem; font-weight: 700; color: #00ffcc;">APEX-ECHO ENGINE</div>
        <div class="stats-container">
            <div>STAMINA</div>
            <div class="bar-bg"><div id="stamina"></div></div>
            <div>INTEGRITY</div>
            <div class="bar-bg"><div id="health"></div></div>
        </div>
        <div class="controls-hint">
            ZQSD : Move | SHIFT : Sprint | SPACE : Jump | CLICK : Fire/Action
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        // --- SCÈNE & RENDU ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x101520, 0.0015);
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 5000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        // --- LUMIÈRES DYNAMIQUES ---
        const sunPivot = new THREE.Object3D();
        scene.add(sunPivot);
        const sun = new THREE.DirectionalLight(0xffffff, 3);
        sun.position.set(0, 500, 0);
        sun.castShadow = true;
        sun.shadow.mapSize.set(2048, 2048);
        sun.shadow.camera.left = -1000; sun.shadow.camera.right = 1000;
        sun.shadow.camera.top = 1000; sun.shadow.camera.bottom = -1000;
        sunPivot.add(sun);
        
        const moon = new THREE.DirectionalLight(0x4444ff, 0.5);
        moon.position.set(0, -500, 0);
        sunPivot.add(moon);

        // --- TERRAIN (PROCÉDURAL SIMPLIFIÉ) ---
        const worldSize = 4000;
        const terrainGeo = new THREE.PlaneGeometry(worldSize, worldSize, 150, 150);
        const posArr = terrainGeo.attributes.position.array;
        
        const getHeight = (x, y) => {
            return (Math.sin(x/100) * Math.cos(y/100) * 40) + (Math.sin(x/40) * 10);
        };

        for (let i = 0; i < posArr.length; i += 3) {
            posArr[i+2] = getHeight(posArr[i], posArr[i+1]);
        }
        terrainGeo.computeVertexNormals();
        const terrainMat = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.8, metalness: 0.2 });
        const terrain = new THREE.Mesh(terrainGeo, terrainMat);
        terrain.rotation.x = -Math.PI / 2;
        terrain.receiveShadow = true;
        scene.add(terrain);

        // --- JOUEUR & CAMÉRA ---
        const player = new THREE.Group();
        scene.add(player);
        player.position.y = 100;

        const body = new THREE.Mesh(
            new THREE.CapsuleGeometry(0.5, 1.8, 4, 10),
            new THREE.MeshStandardMaterial({ color: 0x00ffcc, emissive: 0x00ffcc, emissiveIntensity: 0.5 })
        );
        body.position.y = 1.4;
        body.castShadow = true;
        player.add(body);

        const controls = new PointerLockControls(camera, document.body);
        window.addEventListener('click', () => {
            if (controls.isLocked) fire();
            else controls.lock();
        });

        const camPivot = new THREE.Object3D();
        camPivot.position.set(0, 4, 8);
        player.add(camPivot);

        // --- SYSTÈME DE TIR (ARC RAIDERS) ---
        const bullets = [];
        function fire() {
            const bullet = new THREE.Mesh(
                new THREE.SphereGeometry(0.1, 8, 8),
                new THREE.MeshBasicMaterial({ color: 0x00ffcc })
            );
            const dir = new THREE.Vector3();
            camera.getWorldDirection(dir);
            bullet.position.copy(player.position).add(new THREE.Vector3(0, 2, 0));
            bullet.userData.velocity = dir.multiplyScalar(200);
            bullet.userData.life = 2.0;
            scene.add(bullet);
            bullets.push(bullet);
        }

        // --- LOGIQUE DE JEU ---
        let stamina = 100;
        const keys = {};
        window.addEventListener('keydown', (e) => keys[e.code] = true);
        window.addEventListener('keyup', (e) => keys[e.code] = false);

        const velocity = new THREE.Vector3();
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            if (!controls.isLocked) return;

            // 1. Physique et Gravité
            velocity.y -= 35 * delta;

            // 2. Mouvement & Stamina
            let speed = 18;
            if (keys['ShiftLeft'] && stamina > 0) {
                speed = 40;
                stamina -= 25 * delta;
            } else if (stamina < 100) {
                stamina += 15 * delta;
            }
            document.getElementById('stamina').style.width = stamina + "%";

            const move = new THREE.Vector3();
            if (keys['KeyW']) move.z += 1;
            if (keys['KeyS']) move.z -= 1;
            if (keys['KeyA']) move.x -= 1;
            if (keys['KeyD']) move.x += 1;
            move.normalize();

            const camDir = new THREE.Vector3();
            camera.getWorldDirection(camDir);
            camDir.y = 0; camDir.normalize();
            const camRight = new THREE.Vector3().crossVectors(new THREE.Vector3(0,1,0), camDir);

            if (move.length() > 0) {
                const finalDir = camDir.clone().multiplyScalar(move.z).add(camRight.clone().multiplyScalar(-move.x));
                player.position.add(finalDir.multiplyScalar(speed * delta));
            }

            // 3. Saut
            if (keys['Space'] && player.userData.onGround) {
                velocity.y = 15;
                player.userData.onGround = false;
            }

            // 4. Collision Sol
            player.position.y += velocity.y * delta;
            const h = getHeight(player.position.x, player.position.z);
            if (player.position.y < h) {
                player.position.y = h;
                velocity.y = 0;
                player.userData.onGround = true;
            }

            // 5. Mise à jour Caméra (Suivi doux)
            const targetPos = camPivot.getWorldPosition(new THREE.Vector3());
            camera.position.lerp(targetPos, 0.15);
            camera.lookAt(player.position.clone().add(new THREE.Vector3(0, 2, 0)));

            // 6. Projectiles
            bullets.forEach((b, i) => {
                b.position.add(b.userData.velocity.clone().multiplyScalar(delta));
                b.userData.life -= delta;
                if(b.userData.life <= 0) {
                    scene.remove(b);
                    bullets.splice(i, 1);
                }
            });

            // 7. Cycle Astral
            sunPivot.rotation.z += 0.05 * delta;
            if (sun.position.y < 0) scene.background = new THREE.Color(0x050510);
            else scene.background = new THREE.Color(0x101520);

            renderer.render(scene, camera);
        }

        animate();
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
